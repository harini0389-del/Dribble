<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dribbble Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }

    .hero {
      background-color: #6c757d;
      color: white;
      padding: 60px 0;
      text-align: center;
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }

    .card {
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    footer {
      margin-top: 20px;
    }
  </style>
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Dribbble</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Shots</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Designers</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Teams</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Jobs</a></li>
      </ul>
    </div>
  </div>
</nav>


<section class="hero">
  <div class="container">
    <h2>What are you working on?</h2>
    <p>Dribbble is show and tell for designers.</p>
    <a href="#" class="btn btn-light me-2">Learn More</a>
    <a href="#" class="btn btn-danger">Sign Up</a>
  </div>
</section>


<div class="container mt-5">
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card">
        <img src="Design.jpg" class="card-img-top" alt="design">
        <div class="card-body">
          <h5 class="card-title">Design Shot 1</h5>
          <p class="card-text">A cool UI design example.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="Creative.jpg" class="card-img-top" alt="design">
        <div class="card-body">
          <h5 class="card-title">Design Shot 2</h5>
          <p class="card-text">Another creative design.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="UI.jpg" class="card-img-top" alt="design">
        <div class="card-body">
          <h5 class="card-title">Design Shot 3</h5>
          <p class="card-text">Modern UI concept.</p>
        </div>
      </div>
    </div>

  </div>
</div>


<footer class="bg-dark text-light text-center p-3">
  <p class="mb-0">Harini M (212225240047)</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
